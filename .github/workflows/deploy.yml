name: Deploy to EC2 Instances

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SSH Key
        run: |
          printf '%s' "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Copy index.html to tf-web2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem index.html ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_1 }}:/tmp/index.html
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_1 }} << 'EOF'
            sudo mv /tmp/index.html /usr/share/nginx/html/index.html
            sudo systemctl restart nginx
          EOF

      - name: Copy index.html to do-public-web-2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem index.html ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_2 }}:/tmp/index.html
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_2 }} << 'EOF'
            sudo mv /tmp/index.html /usr/share/nginx/html/index.html
            sudo systemctl restart nginx
          EOF